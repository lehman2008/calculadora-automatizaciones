<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Ahorro de Tiempo</title>
</head>
<body>
    <h1>Calculadora de Ahorro de Tiempo</h1>
    <form>
        <label for="inputTiempoOriginal">Tiempo Original (en horas):</label>
        <input type="number" id="inputTiempoOriginal" step="0.1" required>

        <label for="inputTiempoAhorrado">Tiempo Ahorrado (en horas):</label>
        <input type="number" id="inputTiempoAhorrado" step="0.1" required>

        <button type="button" onclick="calcularAhorro()">Calcular Ahorro</button>
    </form>

    <h2>Resultados:</h2>
    <p id="resultado"></p>

    <script>
        function calcularAhorro() {
            const tiempoOriginal = parseFloat(document.getElementById('inputTiempoOriginal').value);
            const tiempoAhorrado = parseFloat(document.getElementById('inputTiempoAhorrado').value);
            const nuevoTiempo = tiempoOriginal - tiempoAhorrado;
            document.getElementById('resultado').innerText = `Nuevo Tiempo: ${nuevoTiempo} horas`;
        }
    </script>
</body>
</html>
